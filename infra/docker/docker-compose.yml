# ============================================
# LLM Forge — Docker Compose (Local Development)
# ============================================
# Usage: docker compose up -d
# Starts: PostgreSQL, Redis, MinIO (S3), FastAPI, Celery Worker

services:
  # === PostgreSQL 16 ===
  postgres:
    image: postgres:16-alpine
    container_name: llmforge-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: llmforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === Redis 7 ===
  redis:
    image: redis:7-alpine
    container_name: llmforge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === MinIO (S3-Compatible Object Storage) ===
  minio:
    image: minio/minio:latest
    container_name: llmforge-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === FastAPI ML Service ===
  ml-service:
    build:
      context: ./apps/ml-service
      dockerfile: Dockerfile
    container_name: llmforge-ml-service
    env_file:
      - ./apps/ml-service/.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./apps/ml-service:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # === Celery Worker (Data Processing) ===
  celery-data-worker:
    build:
      context: ./apps/ml-service
      dockerfile: Dockerfile
    container_name: llmforge-celery-data
    env_file:
      - ./apps/ml-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/ml-service:/app
    command: celery -A app.core.celery_app worker -Q data -l info --concurrency=2

  # === Celery Worker (Training) ===
  celery-training-worker:
    build:
      context: ./apps/ml-service
      dockerfile: Dockerfile
    container_name: llmforge-celery-training
    env_file:
      - ./apps/ml-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/ml-service:/app
    command: celery -A app.core.celery_app worker -Q training -l info --concurrency=1

volumes:
  postgres_data:
  redis_data:
  minio_data:
